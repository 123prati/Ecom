<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mercato account login." />
    <title>Mercato Login</title>
    <link rel="stylesheet" href="assets/auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <a class="brand" href="/">
        <span class="brand-mark">M</span>
        <span>Mercato</span>
      </a>

      <section class="auth-card">
        <h1>Sign in</h1>
        <form id="loginForm" novalidate>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
            <small class="field-error"></small>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
            <small class="field-error"></small>
          </label>
          <label class="check-row">
            <input type="checkbox" name="rememberMe" />
            <span>Remember me</span>
          </label>
          <button class="primary-button" type="submit">Continue</button>
          <p class="form-message" id="loginMessage" role="status"></p>
        </form>

        <div class="auth-links">
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <div class="divider"><span>or</span></div>
        <div class="oauth-grid">
          <a class="oauth-button" href="/api/auth/google">Continue with Google</a>
          <a class="oauth-button" href="/api/auth/facebook">Continue with Facebook</a>
        </div>
      </section>

      <section class="create-panel">
        <span>New to Mercato?</span>
        <a class="secondary-button" href="signup.html">Create your account</a>
      </section>
    </main>
    <script src="assets/auth.js"></script>
  </body>
</html>
