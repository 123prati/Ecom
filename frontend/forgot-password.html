<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | Mercato</title>
    <link rel="stylesheet" href="assets/auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <a class="brand" href="/">
        <span class="brand-mark">M</span>
        <span>Mercato</span>
      </a>

      <section class="auth-card">
        <h1>Password assistance</h1>
        <p class="muted">Enter your email and we will create a secure reset link.</p>
        <form id="forgotForm" novalidate>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
            <small class="field-error"></small>
          </label>
          <button class="primary-button" type="submit">Send reset link</button>
          <p class="form-message" id="forgotMessage" role="status"></p>
        </form>
      </section>
    </main>
    <script src="assets/auth.js"></script>
  </body>
</html>
