<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse Mercato ecommerce products." />
    <title>Products | Mercato</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Mercato home">
        <span class="brand-mark">M</span>
        <span>Mercato</span>
      </a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="products.html" aria-current="page">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="checkout.html">Checkout</a>
      </nav>
      <button class="cart-button" type="button" id="cartButton" aria-label="Open cart">
        <span>Cart</span>
        <strong id="cartCount">0</strong>
      </button>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Catalog</p>
        <h1>Shop the full Mercato collection.</h1>
        <p>Filter by category, search by product, and add items to your cart from one focused catalog page.</p>
      </section>

      <section class="toolbar" aria-label="Product tools">
        <label class="search-field">
          <span>Search products</span>
          <input id="searchInput" type="search" placeholder="Search by name or category" />
        </label>
        <label class="select-field">
          <span>Category</span>
          <select id="categoryFilter">
            <option value="all">All categories</option>
            <option value="tech">Tech</option>
            <option value="home">Home</option>
            <option value="style">Style</option>
          </select>
        </label>
      </section>

      <section class="product-grid page-grid" id="productGrid" aria-live="polite"></section>
    </main>

    <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
      <div class="cart-panel" role="dialog" aria-modal="true" aria-labelledby="cartTitle">
        <div class="cart-header">
          <h2 id="cartTitle">Shopping Cart</h2>
          <button class="icon-button" type="button" id="closeCart" aria-label="Close cart">x</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
          <div class="summary-row total">
            <span>Total</span>
            <strong id="drawerTotal">$0.00</strong>
          </div>
          <a class="button primary checkout-button" href="checkout.html" id="drawerCheckout">Review checkout</a>
        </div>
      </div>
    </aside>

    <footer class="footer">
      <span>Mercato ecommerce demo</span>
      <span>Products</span>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
