<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | Mercato</title>
    <link rel="stylesheet" href="assets/auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <a class="brand" href="/">
        <span class="brand-mark">M</span>
        <span>Mercato</span>
      </a>

      <section class="auth-card">
        <h1>Create account</h1>
        <form id="signupForm" novalidate>
          <label>
            <span>Your name</span>
            <input type="text" name="name" autocomplete="name" required minlength="2" />
            <small class="field-error"></small>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" autocomplete="email" required />
            <small class="field-error"></small>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required minlength="6" />
            <small class="field-error"></small>
          </label>
          <label class="check-row">
            <input type="checkbox" name="rememberMe" checked />
            <span>Keep me signed in</span>
          </label>
          <button class="primary-button" type="submit">Create account</button>
          <p class="form-message" id="signupMessage" role="status"></p>
        </form>
      </section>

      <section class="create-panel">
        <span>Already have an account?</span>
        <a class="secondary-button" href="index.html">Sign in</a>
      </section>
    </main>
    <script src="assets/auth.js"></script>
  </body>
</html>
